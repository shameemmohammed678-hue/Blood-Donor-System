{% extends "base.html" %}

{% block title %}Search Donors{% endblock %}

{% block content %}

<h2 class="text-center mb-4">Search Donors</h2>

<div class="container">

    <!-- SEARCH FORM -->
    <div class="card shadow p-4 mb-4">
    
    <div class="mb-3">
        <label><strong>Blood Group:</strong></label>
        <select class="form-control" id="bloodGroup">
            <option value="">-- Select Blood Group --</option>
            <option value="A+">A+</option>
            <option value="A-">A-</option>
            <option value="B+">B+</option>
            <option value="B-">B-</option>
            <option value="O+">O+</option>
            <option value="O-">O-</option>
            <option value="AB+">AB+</option>
            <option value="AB-">AB-</option>
        </select>
    </div>

    <div class="mb-3">
        <label><strong>Location:</strong></label>
        <input type="text" class="form-control" id="location" placeholder="e.g., Chennai">
    </div>

    <button class="btn btn-primary w-100" onclick="searchDonors()">Search</button>
</div>



    <!-- RESULTS -->
    <h4>Matching Donors:</h4>
    <div id="results"></div>

</div>

<script>
function searchDonors() {

    const bg = document.getElementById("bloodGroup").value.trim();
    const loc = document.getElementById("location").value.trim();

    if (bg === "" || loc === "") {
        alert("Please enter blood group and location!");
        return;
    }

    fetch("/hospital/search", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            blood_group: bg,
            location: loc
        })
    })
    .then(res => res.json())
    .then(data => {
        const resultsDiv = document.getElementById("results");
        resultsDiv.innerHTML = "";

        if (!data.donors || data.donors.length === 0) {
            resultsDiv.innerHTML = `
                <div class="alert alert-warning">No donors found.</div>
            `;
            return;
        }

        data.donors.forEach(donor => {
            resultsDiv.innerHTML += `
                <div class="card shadow-sm p-3 mb-3">

                    <p><strong>Donor ID:</strong> ${donor.donor_id}</p>

                    <p><strong>Name:</strong> ${donor.D_Name}</p>

                    <p><strong>Phone:</strong> ${donor.phone}</p>

                    <p><strong>Email:</strong> ${donor.email}</p>

                    <p><strong>Blood Group:</strong> 
                        <span class="badge bg-danger">${donor.blood_group}</span>
                    </p>

                    <p><strong>Location:</strong> ${donor.location}</p>

                    <p><strong>Availability:</strong> 
                        <span class="badge bg-success">${donor.availability_status}</span>
                    </p>

                </div>
            `;
        });
    })
    .catch(err => {
        console.error(err);
        alert("Error searching donors.");
    });
}
</script>

{% endblock %}
