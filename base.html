<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Blood Donor Finder And Emergency Request System {% endblock %}</title>
    
    <link rel="icon" type="image/png" href="{{ url_for('static', filename ='images/logo.png')}}">

    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename = 'css/style.css') }}">
    
    <!-- logo -->

    <style>
        body {
            background-color: #f8f9fa;
        }
        .navbar {
            background-color: #dc3545 !important;
        }
        .navbar-brand, .nav-link {
            color: white !important;
            font-weight: 600;
        }
        .nav-link:hover {
            color: #ffe6e6 !important;
        }
        footer {
            margin-top: 50px;
            padding: 10px;
            text-align: center;
            background: #dc3545;
            color: white;
        }
    </style>

</head>

<body>

    <!-- NAVIGATION BAR -->
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="/">Blood Donor Finder And Emergency Request System</a>

            <button class="navbar-toggler text-white" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon" style="filter: invert(1);"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">

                    <li class="nav-item">
                        <a class="nav-link" href="/">Home</a>
                    </li>

                    <!-- Donor -->
                    <li class="nav-item">
                        <a class="nav-link" href="/donor/login">Donor</a>
                    </li>

                    <!-- Hospital -->
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('hospital.hospital_login_page')}}">Hospital</a>
                    </li>

                    <!-- Admin -->
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('admin.admin_login')}}">Admin</a>
                    </li>

                </ul>
            </div>
        </div>
    </nav>


    <!-- MAIN CONTENT -->
    <div class="container mt-4">
        {% block content %}
        {% endblock %}
    </div>


    <footer>
        © 2025 Blood Donor Finder And Emergency Request System  Developed by - Mohammed Shameem.J
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
